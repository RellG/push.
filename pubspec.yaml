name: push_app
description: Daily pushup tracker for Android and iOS.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  lucide_icons: ^0.257.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist.ttf
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono.ttf
